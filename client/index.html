<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Panchayat - A political simulator game where you build your manifesto and win elections">
    <title>Panchayat - Political Simulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Fredoka:wght@400;500;600;700&family=Lilita+One&family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Background -->
    <div class="game-bg">
        <div class="bg-layer"></div>
    </div>

    <!-- ═══ TOP BAR ═══ -->
    <header class="topbar" id="topbar">
        <div class="topbar-left">
            <button class="hamburger-btn" id="menuBtn">
                <span></span><span></span><span></span>
            </button>
            <div class="topbar-title">PANCHAYAT</div>
        </div>

        <div class="topbar-center">
            <div class="level-badge" id="levelBadge">
                <div class="level-shield">
                    <span class="level-text">LEVEL 1</span>
                </div>
                <div class="level-stars">
                    <span class="lstar filled">★</span>
                    <span class="lstar filled">★</span>
                    <span class="lstar filled">★</span>
                </div>
            </div>
        </div>

        <div class="topbar-right">
            <div class="coin-badge">
                <span class="coin-icon">🪙</span>
                <span class="coin-count" id="coinCount">1,250</span>
            </div>
            <button class="settings-btn" id="settingsBtn">⚙️</button>
        </div>
    </header>

    <!-- ═══ MAIN CONTENT ═══ -->
    <main class="game-main">

        <!-- CANDIDATE CARD (top-left) -->
        <section class="candidate-card" id="candidateCard">
            <div class="candidate-inner">
                <div class="avatar-frame">
                    <img src="assets/candidate_avatar.png?v=3" alt="Rajesh Kumar" class="avatar-img" id="candidateAvatar">
                </div>
                <div class="candidate-info">
                    <h1 class="candidate-name" id="candidateName">Rajesh Kumar</h1>
                    <div class="party-badge">
                        <span class="party-flag">◎</span>
                        <span class="party-name" id="candidateParty">Jan Seva Party</span>
                    </div>
                    <div class="popularity-row">
                        <span class="pop-label">Popularity:</span>
                        <div class="pop-stars">
                            <span class="pstar filled">★</span>
                            <span class="pstar filled">★</span>
                            <span class="pstar">★</span>
                            <span class="pstar">★</span>
                            <span class="pstar">★</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- BOTTOM CONTENT – Two separate panels -->
        <div class="panels-row">

            <!-- LEFT PANEL: Manifesto -->
            <section class="panel-card manifesto-panel" id="manifestoPanel">
                <div class="panel-card-header">
                    <span class="panel-card-title">Manifesto</span>
                </div>
                <div class="panel-card-body">
                    <div class="manifesto-column" id="manifestoColumn">
                        <div class="manifesto-list" id="manifestoList">
                            <!-- Items rendered by JS -->
                        </div>
                    </div>
                </div>
            </section>

            <!-- RIGHT PANEL: Voter Demographics -->
            <section class="panel-card demographics-panel" id="demographicsPanel">
                <div class="panel-card-header">
                    <span class="panel-card-title">Voter Demographics</span>
                </div>
                <div class="panel-card-body">
                    <div class="demographics-column" id="demographicsColumn">
                        <div class="bar-chart" id="barChart">
                            <!-- Bars rendered by JS -->
                        </div>
                    </div>
                </div>
            </section>

        </div>

        <!-- ADD MANIFESTO BUTTON (bottom-right) -->
        <button class="add-manifesto-btn" id="addManifestoBtn">
            <span class="btn-plus">✚</span>
            <span class="btn-label">ADD MANIFESTO</span>
        </button>
    </main>

    <!-- ═══ ADD MANIFESTO POPUP ═══ -->
    <div class="popup-overlay" id="popupOverlay">
        <div class="popup-panel" id="popupPanel">
            <!-- Close Button -->
            <button class="popup-close-btn" id="popupCloseBtn">✕</button>

            <!-- Scrollable Manifesto Options -->
            <div class="popup-scroll-area" id="popupScrollArea">
                <!-- Option cards rendered by JS -->
            </div>

            <!-- Custom Input Section -->
            <div class="popup-custom-input">
                <div class="custom-input-icon">🪶</div>
                <textarea class="custom-manifesto-textarea" id="customManifestoInput" placeholder="Write your own manifesto…" rows="2"></textarea>
            </div>

            <!-- Add to Campaign Button -->
            <button class="popup-action-btn" id="popupActionBtn">
                <span class="popup-action-text">Add to Campaign</span>
            </button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span class="toast-icon">🎉</span>
        <span class="toast-msg" id="toastMsg">Promise Added!</span>
    </div>

    <script src="game.js"></script>
</body>
</html>
